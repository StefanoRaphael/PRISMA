<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>PRISMA — Criativo Quote 1080x1920</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#333;}
:root{
  --abyss:#050D18; --ink:#0A1A2F; --line:#1c3555; --text:#F4F7FB; --muted:#93A3B8;
  --amber:#FF9160; --magenta:#FF5FA2; --violet:#A96BFF; --cyan:#4FC9F5; --aurora:#6FE3C4;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.canvas{
  width:1080px;height:1920px;position:relative;overflow:hidden;margin:0 auto;
  background:var(--abyss); font-family:var(--sans); color:var(--text);
}
.glow{
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 900px 500px at 50% -5%, rgba(169,107,255,.16), transparent 60%),
    radial-gradient(ellipse 900px 500px at 50% 105%, rgba(79,201,245,.14), transparent 60%);
}

.card{
  position:relative;z-index:9;margin:280px 64px 0;border-radius:32px;overflow:hidden;
  border:1px solid rgba(244,247,251,.1);background:rgba(255,255,255,.02);
  box-shadow:0 40px 90px rgba(0,0,0,.5);
}
.foto{position:relative;width:100%;height:1080px;}
.foto img{width:100%;height:100%;object-fit:cover;object-position:50% 14%;display:block;}
.foto::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(5,13,24,0) 50%, rgba(5,13,24,.9) 100%);}
.foto-tag{
  position:absolute;top:24px;left:24px;z-index:3;
  background:rgba(5,13,24,.55);backdrop-filter:blur(8px);
  font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text);
  padding:9px 18px;border-radius:999px;
}

.corpo{padding:44px 46px 48px;}
.quote{
  font-size:38px;font-weight:700;line-height:1.32;letter-spacing:-1px;color:var(--text);
}
.quote .grad{
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.autoria{
  margin-top:20px;padding-top:20px;border-top:1px solid var(--line);
  font-size:17px;color:var(--muted);
}
.autoria b{color:var(--text);font-weight:600;}

.rodape{position:relative;z-index:9;text-align:center;padding:140px 90px 0;}
.cta{
  display:inline-block;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  color:var(--abyss);font-weight:800;font-size:30px;letter-spacing:-.4px;
  padding:26px 60px;border-radius:999px;
  box-shadow:0 24px 50px rgba(169,107,255,.3);
}
.wordmark{
  margin-top:36px;font-size:24px;font-weight:800;letter-spacing:7px;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>

    <div class="card">
      <div class="foto">
        <img src="assets/oc-apresentacao.jpg" alt="">
        <div class="foto-tag">Apresentação</div>
      </div>
      <div class="corpo">
        <div class="quote">A imagem certa <span class="grad">abre a conversa</span> antes de você dizer o preço.</div>
        <div class="autoria">Retrato gerado pelo <b>PRISMA</b>, com o mesmo olhar de 20 anos de carreira em fotografia por trás.</div>
      </div>
    </div>

    <div class="rodape">
      <div class="cta">Acesse o PRISMA</div>
      <div class="wordmark">P R I S M A</div>
    </div>
  </div>
</body>
</html>
