<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>PRISMA — Criativo Método 1080x1920</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#333;}
:root{
  --abyss:#050D18; --ink:#0A1A2F; --text:#F4F7FB; --muted:#93A3B8;
  --amber:#FF9160; --magenta:#FF5FA2; --violet:#A96BFF; --cyan:#4FC9F5; --aurora:#6FE3C4;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.canvas{
  width:1080px;height:1920px;position:relative;overflow:hidden;margin:0 auto;
  background:var(--abyss); font-family:var(--sans); color:var(--text);
}
.glow{
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 1000px 600px at 50% -10%, rgba(169,107,255,.22), transparent 60%),
    radial-gradient(ellipse 900px 500px at 0% 100%, rgba(255,145,96,.14), transparent 60%),
    radial-gradient(ellipse 900px 500px at 100% 100%, rgba(79,201,245,.14), transparent 60%);
}

.topo{position:relative;z-index:9;padding:104px 74px 0;text-align:center;}
.eyebrow{font-size:19px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--aurora);}
.headline{
  margin-top:26px;font-weight:800;font-size:60px;line-height:1.16;letter-spacing:-2px;color:var(--text);
}
.headline .grad{
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{
  margin:26px auto 0;max-width:820px;font-size:24px;line-height:1.5;color:var(--muted);font-weight:400;letter-spacing:-.3px;
}
.sub b{color:var(--text);font-weight:600;}

.cta{
  margin-top:40px;display:inline-block;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  color:var(--abyss);font-weight:800;font-size:30px;letter-spacing:-.4px;
  padding:26px 60px;border-radius:999px;
  box-shadow:0 24px 50px rgba(169,107,255,.3);
}

.stage{position:relative;margin:88px auto 0;width:1080px;height:840px;}
.peek{
  position:absolute;top:60px;width:300px;height:660px;border-radius:26px;overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55);
}
.peek img{width:100%;height:100%;object-fit:cover;object-position:50% 15%;display:block;}
.peek.left{left:66px;transform:rotate(-4deg);}
.peek.right{right:66px;transform:rotate(4deg);}
.peek::after{
  content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(5,13,24,0) 60%, rgba(5,13,24,.55) 100%);
}
.peek-tag{
  position:absolute;bottom:18px;left:18px;z-index:3;
  background:rgba(5,13,24,.6);backdrop-filter:blur(6px);
  font-size:14px;font-weight:600;color:var(--text);padding:7px 14px;border-radius:999px;
}

.phone{
  position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:400px;height:800px;border-radius:70px;
  background:linear-gradient(160deg,#12253f,#050D18 60%);
  box-shadow:0 60px 120px rgba(0,0,0,.6), inset 0 0 0 2px rgba(255,255,255,.08);
  z-index:5;
}
.cam-module{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  width:220px;height:220px;border-radius:44px;
  background:linear-gradient(160deg,#16324f,#0A1A2F);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.05);
}
.lens{
  position:absolute;width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #1c3a5c, #050D18 70%);
  box-shadow:0 0 0 6px rgba(255,255,255,.04), inset 0 0 20px rgba(0,0,0,.6);
}
.lens::after{
  content:'';position:absolute;inset:22px;border-radius:50%;
  background:conic-gradient(from 90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora),var(--amber));
  opacity:.85;
}
.lens.tl{top:18px;left:18px;}
.lens.br{bottom:18px;right:18px;}
.flash{
  position:absolute;top:24px;right:24px;width:26px;height:26px;border-radius:50%;
  background:radial-gradient(circle, #fff, #cfd7e0 70%);
  box-shadow:0 0 24px rgba(255,255,255,.5);
}

.rodape{position:relative;z-index:9;text-align:center;padding:60px 90px 0;}
.wordmark{
  font-size:26px;font-weight:800;letter-spacing:8px;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>

    <div class="topo">
      <div class="eyebrow">O método do estúdio</div>
      <div class="headline">Você manda uma foto<br>do celular. <span class="grad">Sai o retrato</span><br>de quem fotografa há<br>20 anos.</div>
      <div class="sub">O mesmo olhar treinado em produções de moda e editorial pelo mundo, <b>agora aplicado ao seu rosto.</b> 12 contextos, sem fotógrafo agendado.</div>
      <div class="cta">Acesse o PRISMA</div>
    </div>

    <div class="stage">
      <div class="peek left">
        <img src="assets/oc-editorial.jpg" alt="">
        <div class="peek-tag">Editorial</div>
      </div>
      <div class="peek right">
        <img src="assets/oc-esporte.jpg" alt="">
        <div class="peek-tag">Esporte</div>
      </div>
      <div class="phone">
        <div class="cam-module">
          <div class="lens tl"></div>
          <div class="lens br"></div>
          <div class="flash"></div>
        </div>
      </div>
    </div>

    <div class="rodape">
      <div class="wordmark">P R I S M A</div>
    </div>
  </div>
</body>
</html>
