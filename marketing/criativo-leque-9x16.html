<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>PRISMA — Criativo Leque 1080x1920</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#333;}
:root{
  --abyss:#050D18; --ink:#0A1A2F; --text:#F4F7FB; --muted:#93A3B8;
  --amber:#FF9160; --magenta:#FF5FA2; --violet:#A96BFF; --cyan:#4FC9F5; --aurora:#6FE3C4;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.canvas{
  width:1080px;height:1920px;position:relative;overflow:hidden;margin:0 auto;
  background:var(--abyss); font-family:var(--sans); color:var(--text);
}
.glow{
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 1000px 600px at 50% -10%, rgba(79,201,245,.20), transparent 60%),
    radial-gradient(ellipse 900px 500px at 50% 105%, rgba(111,227,196,.16), transparent 60%);
}

.topo{position:relative;z-index:9;padding:112px 78px 0;text-align:center;}
.eyebrow{font-size:19px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--cyan);}
.headline{
  margin-top:26px;font-weight:800;font-size:58px;line-height:1.18;letter-spacing:-1.8px;color:var(--text);
}
.headline .grad{
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

.stage{position:relative;margin:78px auto 0;width:1080px;height:900px;}
.origem{
  position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:220px;height:280px;border-radius:22px;overflow:hidden;z-index:20;
  border:3px solid var(--abyss);
  box-shadow:0 20px 50px rgba(0,0,0,.6);
}
.origem img{width:100%;height:100%;object-fit:cover;object-position:50% 20%;display:block;}
.origem-tag{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:3;
  background:rgba(5,13,24,.7);backdrop-filter:blur(6px);
  font-size:13px;font-weight:600;color:var(--text);padding:6px 14px;border-radius:999px;
}

.card{
  position:absolute;top:340px;width:260px;height:400px;border-radius:22px;overflow:hidden;
  box-shadow:0 30px 60px rgba(0,0,0,.5);
  transform-origin:top center;
}
.card img{width:100%;height:100%;object-fit:cover;object-position:50% 15%;display:block;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg, rgba(5,13,24,0) 60%, rgba(5,13,24,.6) 100%);}
.card-tag{
  position:absolute;bottom:14px;left:14px;z-index:3;
  background:rgba(5,13,24,.6);backdrop-filter:blur(6px);
  font-size:13px;font-weight:600;color:var(--text);padding:6px 13px;border-radius:999px;
}
.c1{left:60px; transform:rotate(-14deg);}
.c2{left:270px; transform:rotate(-6deg); top:310px;}
.c3{right:270px; transform:rotate(6deg); top:310px;}
.c4{right:60px; transform:rotate(14deg);}

.rodape{position:relative;z-index:9;text-align:center;padding:24px 90px 0;}
.frase{font-size:23px;line-height:1.55;color:var(--muted);font-weight:400;letter-spacing:-.2px;}
.frase b{color:var(--text);font-weight:600;}
.cta{
  margin-top:36px;display:inline-block;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  color:var(--abyss);font-weight:800;font-size:30px;letter-spacing:-.4px;
  padding:26px 60px;border-radius:999px;
  box-shadow:0 24px 50px rgba(79,201,245,.3);
}
.wordmark{
  margin-top:40px;font-size:24px;font-weight:800;letter-spacing:7px;
  background:linear-gradient(90deg,var(--amber),var(--magenta),var(--violet),var(--cyan),var(--aurora));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>

    <div class="topo">
      <div class="eyebrow">Uma entrada, doze saídas</div>
      <div class="headline">Uma selfie sua vira <span class="grad">retratos pra 12 contextos</span> diferentes.</div>
    </div>

    <div class="stage">
      <div class="card c1"><img src="assets/oc-esporte.jpg" alt=""><div class="card-tag">Esporte</div></div>
      <div class="card c2"><img src="assets/oc-noite.jpg" alt=""><div class="card-tag">Noite</div></div>
      <div class="card c3"><img src="assets/oc-viagem.jpg" alt=""><div class="card-tag">Viagem</div></div>
      <div class="card c4"><img src="assets/oc-apresentacao.jpg" alt=""><div class="card-tag">Apresentação</div></div>
      <div class="origem"><img src="assets/oc-executivo.jpg" alt=""><div class="origem-tag">Sua foto</div></div>
    </div>

    <div class="rodape">
      <div class="frase">Sem sessão física. Sem agendamento.<br><b>Cada contexto pronto quando você precisar.</b></div>
      <div class="cta">Acesse o PRISMA</div>
      <div class="wordmark">P R I S M A</div>
    </div>
  </div>
</body>
</html>
